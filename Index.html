<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cognitive OS V17.1</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    padding:15px;
}

h1{text-align:center;}

textarea{
    width:100%;
    height:120px;
    background:#0b1220;
    color:white;
    border:1px solid #334155;
    padding:10px;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:14px;
    background:#38bdf8;
    border:none;
    width:100%;
    margin-top:10px;
    font-weight:bold;
    border-radius:8px;
    font-size:16px;
}

#out{
    margin-top:10px;
    background:#0f172a;
    padding:12px;
    border-left:4px solid #38bdf8;
    white-space:pre-wrap;
    min-height:120px;
}
</style>
</head>

<body>

<h1>🧠 Cognitive OS V17.1</h1>

<textarea id="input" placeholder="Scrivi qui..."></textarea>

<button onclick="run()">⚙️ Analizza</button>

<div id="out">Nessun dato ancora</div>

<script>
/* ---------------- MEMORY SYSTEM ---------------- */

function loadMemory(){
    let data = localStorage.getItem("cognitive_memory");
    if(!data) return [];
    return JSON.parse(data);
}

function saveMemory(memory){
    localStorage.setItem("cognitive_memory", JSON.stringify(memory));
}

/* ---------------- ANALYSIS ENGINE ---------------- */

function analyze(text, history){

    let t = text.toLowerCase();

    let stressWords = ["stress","ansia","non riesco","bloccato","caos","pressione"];
    let studyWords = ["studio","studiare","esame","compiti"];
    let goalWords = ["futuro","obiettivo","migliorare","crescere"];

    let stress = 0;
    let study = 0;
    let goal = 0;

    stressWords.forEach(w => { if(t.includes(w)) stress++; });
    studyWords.forEach(w => { if(t.includes(w)) study++; });
    goalWords.forEach(w => { if(t.includes(w)) goal++; });

    // 🔁 CONTEXTO STORICO
    let pastStress = history.filter(h => h.stress > 0).length;
    let trendStress = pastStress >= 2 ? "alto" : "normale";

    let action = "";

    if(stress > 0 && study > 0){
        action = "📚 Difficoltà studio + stress.\nRiduci a 10 minuti di azione semplice.";
    }
    else if(trendStress === "alto"){
        action = "⚠️ Stress ripetuto nel tempo.\nServe riduzione carico mentale oggi.";
    }
    else if(goal === 0){
        action = "🎯 Nessun obiettivo chiaro.\nDefinisci una direzione semplice.";
    }
    else if(t.includes("non riesco")){
        action = "🧠 Blocco mentale rilevato.\nNon forzare: micro-azione immediata.";
    }
    else {
        action = "✔️ Stato stabile.\nContinua su una sola priorità.";
    }

    return {stress, study, goal, action};
}

/* ---------------- MAIN ---------------- */

function run(){

    let input = document.getElementById("input").value;

    if(!input){
        document.getElementById("out").innerText = "Scrivi qualcosa prima.";
        return;
    }

    let memory = loadMemory();

    let result = analyze(input, memory);

    // salva nuova memoria
    memory.push({
        text: input,
        stress: result.stress,
        study: result.study,
        goal: result.goal,
        time: Date.now()
    });

    saveMemory(memory);

    document.getElementById("out").innerText =
`🧠 ANALISI

Stress: ${result.stress}
Studio: ${result.study}
Obiettivi: ${result.goal}

📊 MEMORIA: ${memory.length} eventi salvati

⚡ AZIONE
${result.action}`;
}
</script>

</body>
</html>
